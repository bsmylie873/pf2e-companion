<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0a830"/>
      <stop offset="100%" stop-color="#c47f17"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b06e10"/>
      <stop offset="100%" stop-color="#8a5500"/>
    </linearGradient>
  </defs>
  <!-- d20 icosahedron shape -->
  <polygon points="24,2 44,16 38,42 10,42 4,16" fill="url(#face)" stroke="#7a4a00" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- inner facet lines -->
  <line x1="24" y1="2" x2="10" y2="42" stroke="#7a4a00" stroke-width="0.8" opacity="0.5"/>
  <line x1="24" y1="2" x2="38" y2="42" stroke="#7a4a00" stroke-width="0.8" opacity="0.5"/>
  <line x1="4" y1="16" x2="38" y2="42" stroke="#7a4a00" stroke-width="0.8" opacity="0.5"/>
  <line x1="44" y1="16" x2="10" y2="42" stroke="#7a4a00" stroke-width="0.8" opacity="0.5"/>
  <line x1="4" y1="16" x2="44" y2="16" stroke="#7a4a00" stroke-width="0.8" opacity="0.5"/>
  <!-- "20" text -->
  <text x="24" y="31" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#5a3600">20</text>
</svg>
