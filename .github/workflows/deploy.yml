name: Deploy

on:
  workflow_run:
    workflows: ["Test"]
    branches: [master]
    types: [completed]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy Backend to Fly.io
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  migrate-database:
    name: Run Flyway Migrations
    needs: deploy-backend
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set up Fly.io proxy
        run: |
          flyctl proxy 15432:5432 -a pf2e-companion-db &
          for i in $(seq 1 30); do
            nc -z localhost 15432 && echo "Proxy is ready" && exit 0
            echo "Waiting for proxy... ($i/30)"
            sleep 2
          done
          echo "Proxy failed to start" && exit 1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Run Flyway migrations
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}/database/migrations:/flyway/sql" \
            flyway/flyway:latest \
            -url=jdbc:postgresql://localhost:15432/${{ secrets.POSTGRES_DB }} \
            -user=${{ secrets.POSTGRES_USER }} \
            -password=${{ secrets.POSTGRES_PASSWORD }} \
            -locations=filesystem:/flyway/sql \
            migrate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Build
        working-directory: ui
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_WS_BASE_URL: ${{ vars.VITE_WS_BASE_URL }}

      - name: Generate patch notes JSON
        run: |
          DEPLOY_DATE=$(date -u +"%Y-%m-%d")
          COMMIT_SHA="${GITHUB_SHA::7}"
          node -e "
            const fs = require('fs');
            const notes = fs.readFileSync('RELEASE_NOTES.md', 'utf8');
            fs.writeFileSync('ui/dist/patch-notes.json', JSON.stringify({
              version: '$COMMIT_SHA',
              date: '$DEPLOY_DATE',
              notes: notes
            }, null, 2));
          "

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ui/dist --project-name=pf2e-companion --branch master

  notify-discord:
    name: Discord Deploy Notification
    needs: [deploy-backend, migrate-database, deploy-frontend]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          if git rev-parse last-deploy 2>/dev/null; then
            CHANGELOG=$(git log last-deploy..HEAD --no-merges --format="• %s")
          else
            # First deploy — no tag yet, fall back to last 10
            CHANGELOG=$(git log --oneline -10 --no-merges --format="• %s")
          fi
          # Truncate to 20 lines max for Discord embed limits
          CHANGELOG=$(echo "$CHANGELOG" | head -20)
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Send Discord notification
        continue-on-error: true
        run: |
          DEPLOY_TIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          CHANGELOG=$(cat <<'CHLOG'
          ${{ steps.changelog.outputs.changelog }}
          CHLOG
          )
          # Build the JSON payload safely using jq
          PAYLOAD=$(jq -n \
            --arg title "🚀 PF2E Companion Deployed" \
            --argjson color 5763719 \
            --arg deploy_time "$DEPLOY_TIME" \
            --arg commit "[${GITHUB_SHA::7}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" \
            --arg changes "$CHANGELOG" \
            --arg footer "All jobs passed — backend, database, frontend" \
            '{
              embeds: [{
                title: $title,
                color: $color,
                fields: [
                  { name: "Deployed at", value: $deploy_time, inline: true },
                  { name: "Commit", value: $commit, inline: true },
                  { name: "Changes", value: $changes }
                ],
                footer: { text: $footer }
              }]
            }')
          curl -sf -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

      - name: Update last-deploy tag
        if: success()
        run: |
          git tag -f last-deploy "${{ github.sha }}"
          git push origin last-deploy --force
